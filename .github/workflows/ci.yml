name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.2", "latest"]
    continue-on-error: ${{ matrix.bun-version == '1.2' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx biome ci .
      - run: bun test
